<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
	<th:block th:include="include :: header('上传文件')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-file-upload" enctype="multipart/form-data">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">选择文件：</label>
                <div class="col-sm-8">
                    <input type="file" id="files" name="file" class="form-control" multiple required/>
                    <span class="help-block m-b-none">支持多文件上传，单文件最大50MB</span>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">文件分类：</label>
                <div class="col-sm-8">
                    <select name="category" class="form-control"
                            th:with="type=${@dict.getType('sys_file_category')}">
                        <option value="">请选择分类</option>
                        <option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}"></option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">备注：</label>
                <div class="col-sm-8">
                    <textarea name="remark" class="form-control" rows="3" placeholder="请输入备注"></textarea>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script type="text/javascript">
        var prefix = ctx + "system/file";

        function submitHandler() {
            var fileInput = document.getElementById('files');
            if (fileInput.files.length === 0) {
                $.modal.alertWarning("请选择要上传的文件");
                return;
            }

            var formData = new FormData();
            for (var i = 0; i < fileInput.files.length; i++) {
                formData.append('file', fileInput.files[i]);
            }
            formData.append('category', $("select[name='category']").val());
            formData.append('remark', $("textarea[name='remark']").val());

            $.modal.loading("正在上传，请稍候...");
            $.ajax({
                url: prefix + "/upload",
                type: "post",
                data: formData,
                processData: false,
                contentType: false,
                dataType: "json",
                success: function(result) {
                    $.modal.closeLoading();
                    if (result.code == web_status.SUCCESS) {
                        $.modal.close();
                        parent.$.modal.msgSuccess("上传成功");
                        parent.$.table.refresh();
                    } else {
                        $.modal.alertError(result.msg);
                    }
                },
                error: function(error) {
                    $.modal.closeLoading();
                    $.modal.alertError("上传失败，请稍后重试");
                }
            });
        }
    </script>
</body>
</html>
